# конфиг для форматтера 

preview = true
line-length = 100
indent-width = 2

[format]
preview = true
quote-style = "single"
indent-style = "space"
skip-magic-trailing-comma = true
docstring-code-format = true

[lint]
ignore = ["RUF001", "RUF002", "RUF003"]
select = [
    "F",
    "G",
    "PERF",
    "RUF",
    "W6",
    "E71",
    "E72",
    "E112",
    "E113",
    "E203",
    "E272",
    "E702",
    "E703",
    "E731",
    "W191",
    "W291",
    "W293",
    "UP039",
]

[lint.pydocstyle]
convention = "google"
